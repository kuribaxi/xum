<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XOM TV - Iranska och Kurdiska Kanaler</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: white;
    margin: 0;
    padding: 20px;
    line-height: 1.6;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    width: 100%;
  }
  .header h1 {
    font-size: 2.5em;
    color: #4ecdc4;
    margin: 0;
  }
  .header p {
    font-size: 1.2em;
    margin: 10px 0 0;
  }
  .section {
    margin: 20px 0;
    width: 100%;
  }
  .section h2 {
    color: #4ecdc4;
    border-bottom: 2px solid #4ecdc4;
    padding-bottom: 10px;
    font-size: 1.5em;
  }
  .channel-list, #favorites-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .channel {
    background: #4ecdc4;
    color: #1a1a2e;
    border-radius: 25px;
    padding: 12px 20px;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .channel:hover {
    background: #45b7aa;
    transform: translateY(-2px);
  }
  .favorite-btn {
    margin-left: auto;
    font-size: 1.2em;
    cursor: pointer;
    background: none;
    border: none;
    color: #1a1a2e;
  }
  .favorite-btn.favorite {
    color: #ffd700;
  }
  .player-section {
    margin-top: 20px;
    text-align: center;
  }
  video {
    width: 100%;
    max-width: 100%;
    border-radius: 10px;
    display: none;
  }
  video.active-player {
    display: block;
  }
  .channel-name {
    font-size: 2em;
    color: #4ecdc4;
    margin: 10px 0;
  }
</style>
</head>
<body>
<div class="header">
  <h1>XOM TV</h1>
  <p>Iranska och Kurdiska TV-kanaler</p>
</div>

<div class="section" id="favorites-section" style="display:none;">
  <h2>Favoriter (max 10)</h2>
  <div id="favorites-list"></div>
</div>

<div class="section">
  <h2>Alla Kanaler</h2>
  <div class="channel-list" id="channels-list">
    <!-- Exempelkanaler -->
    <div class="channel" data-stream="https://example.com/stream1.m3u8" data-name="TV1" onclick="playChannel(this)">
      <span>TV1</span>
      <button class="favorite-btn" onclick="toggleFavorite(event, this, 'TV1')">&#9734;</button>
    </div>
    <div class="channel" data-stream="https://example.com/stream2.m3u8" data-name="TV2" onclick="playChannel(this)">
      <span>TV2</span>
      <button class="favorite-btn" onclick="toggleFavorite(event, this, 'TV2')">&#9734;</button>
    </div>
    <!-- Fler kanaler här -->
  </div>
</div>

<div class="player-section">
  <div class="channel-name" id="current-channel-name">Välj en kanal</div>
  <video controls id="player" muted></video>
</div>

<script>
  function playChannel(element) {
    const streamUrl = element.dataset.stream;
    const video = document.getElementById('player');
    const channelName = element.dataset.name;

    video.src = streamUrl;
    video.classList.add('active-player');
    video.muted = false; // Ljud på
    video.play();

    document.getElementById('current-channel-name').textContent = channelName;
  }

  function toggleFavorite(event, button, channelName) {
    event.stopPropagation(); // Förhindrar att playChannel triggas
    const channelDiv = button.closest('.channel');
    const favoritesList = document.getElementById('favorites-list');
    const favoritesSection = document.getElementById('favorites-section');
    const currentFavorites = favoritesList.querySelectorAll('.channel').length;

    if (!button.classList.contains('favorite') && currentFavorites >= 10) {
      alert('Du kan bara ha upp till 10 favoriter.');
      return;
    }

    button.classList.toggle('favorite');

    if (button.classList.contains('favorite')) {
      // Kopiera kanal till favoriter
      const favoriteChannel = channelDiv.cloneNode(true);
      favoriteChannel.querySelector('.favorite-btn').onclick = function(e) { toggleFavorite(e, this, channelName); };
      favoriteChannel.onclick = function() { playChannel(favoriteChannel); };
      favoritesList.appendChild(favoriteChannel);
      favoritesSection.style.display = 'block';
    } else {
      // Ta bort från favoriter
      const favChannels = favoritesList.querySelectorAll('.channel');
      favChannels.forEach(ch => {
        if (ch.dataset.name === channelName) {
          favoritesList.removeChild(ch);
        }
      });
      if (favoritesList.children.length === 0) {
        favoritesSection.style.display = 'none';
      }
    }
  }
</script>
</body>
</html>
